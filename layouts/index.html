<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio - Le Quoc Trong</title>

<!-- FONT -->
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">

<style>

/* RESET */
body {
    margin: 0;
    background: #0f0f0f;
    color: #fff;
    font-family: 'Montserrat', sans-serif;
}

/* LAYOUT */
.full-screen-wrapper {
    width: 100vw;
    height: 100vh;
}

.split-container {
    display: flex;
    height: 100%;
}

/* LEFT */
.text-side {
    flex: 5;
    display: flex;
    align-items: center;
    justify-content: flex-end;
    padding-right: 80px;
}

.content-box {
    max-width: 550px;
}

/* TITLE */
.main-title {
    font-size: 80px;
    font-weight: 900;
    line-height: 0.85;
    letter-spacing: -4px;
    margin-bottom: 40px;
}

.line-wrapper {
    overflow: hidden;
}

.outlined {
    color: transparent;
    -webkit-text-stroke: 1px #fff;
}

/* DESCRIPTION */
.description-block {
    border-left: 3px solid #00ffd5;
    padding-left: 20px;
}

.job-title {
    font-size: 14px;
    font-weight: 700;
    color: #00ffd5;
}

.bio {
    font-size: 14px;
    color: #aaa;
}

/* RIGHT */
.image-side {
    flex: 5;
    display: flex;
    justify-content: center;
    align-items: center;
    background: radial-gradient(circle, #1a1a1a, #0f0f0f);
}

.image-side img {
    width: 65%;
    border-radius: 20px;
    filter: grayscale(100%) contrast(110%);
    transition: 0.5s;
}

.image-side img:hover {
    filter: none;
    transform: scale(1.05);
}

/* ANIMATION */
.reveal-item {
    opacity: 0;
    transform: translateY(50px);
    animation: revealUp 1s ease forwards;
}

.reveal-item:nth-child(1) { animation-delay: 0.2s; }
.reveal-item:nth-child(2) { animation-delay: 0.3s; }
.reveal-item:nth-child(3) { animation-delay: 0.4s; }
.reveal-item:nth-child(4) { animation-delay: 0.5s; }
.reveal-item:nth-child(5) { animation-delay: 0.6s; }

@keyframes revealUp {
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.reveal-image {
    opacity: 0;
    animation: fadeIn 1.5s forwards;
}

@keyframes fadeIn {
    to { opacity: 1; }
}

/* MOBILE */
@media (max-width: 900px) {
    .split-container {
        flex-direction: column-reverse;
    }

    .text-side {
        padding: 40px 20px;
        justify-content: center;
    }

    .main-title {
        font-size: 42px;
    }

    .image-side img {
        width: 90%;
    }
}

</style>
</head>

<body>

<div class="full-screen-wrapper">
    <div class="split-container">

        <!-- LEFT -->
        <div class="text-side">
            <div class="content-box">

                <h1 class="main-title">
                    <div class="line-wrapper"><span class="reveal-item">BUILD</span></div>
                    <div class="line-wrapper"><span class="reveal-item">SYSTEMS.</span></div>
                    <div class="line-wrapper"><span class="reveal-item outlined">SOLVE</span></div>
                    <div class="line-wrapper"><span class="reveal-item outlined">PROBLEMS.</span></div>
                    <div class="line-wrapper"><span class="reveal-item outlined">SHIP IMPACT.</span></div>
                </h1>

                <div class="description-block">
                    <h3 class="job-title">Aspiring Backend Developer</h3>
                    <p class="bio">
                        I design and build scalable systems using Java & JavaScript.<br>
                        Focused on clean architecture, performance, and real-world impact.
                    </p>
                </div>

            </div>
        </div>

        <!-- RIGHT -->
        <div class="image-side">
            <div class="image-inner reveal-image">
                <img src="anhdaidien.jpg" alt="Le Quoc Trong">
            </div>
        </div>

    </div>
</div>

</body>
</html>
